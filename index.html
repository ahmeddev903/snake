<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake & Ladder Board</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #eee;
      font-family: Arial, sans-serif;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(10, 60px);
      grid-template-rows: repeat(10, 60px);
      gap: 2px;
      position: relative;
    }
    .cell {
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      border-radius: 6px;
      color: #fff;
    }
    /* Alternate colors */
    .cell:nth-child(odd) {
      background: #4caf50;
    }
    .cell:nth-child(even) {
      background: #2196f3;
    }

    /* Snake (red line) */
    .snake {
      position: absolute;
      width: 200px;
      height: 10px;
      background: red;
      transform: rotate(45deg);
      top: 200px;
      left: 150px;
      border-radius: 5px;
    }

    /* Ladder */
    .ladder {
      position: absolute;
      top: 100px;
      left: 300px;
      width: 60px;
      height: 200px;
    }
    .ladder .side {
      position: absolute;
      width: 6px;
      height: 100%;
      background: saddlebrown;
    }
    .ladder .side.left { left: 0; }
    .ladder .side.right { right: 0; }
    .ladder .rung {
      position: absolute;
      height: 4px;
      width: 100%;
      background: peru;
    }
    .ladder .rung:nth-child(3) { top: 40px; }
    .ladder .rung:nth-child(4) { top: 80px; }
    .ladder .rung:nth-child(5) { top: 120px; }
    .ladder .rung:nth-child(6) { top: 160px; }
  </style>
</head>
<body>
  <div class="board">
    <!-- 1 to 100 cells -->
    <!-- Generated in sequence -->
    <!-- Row 1 -->
    <div class="cell">1</div><div class="cell">2</div><div class="cell">3</div><div class="cell">4</div><div class="cell">5</div>
    <div class="cell">6</div><div class="cell">7</div><div class="cell">8</div><div class="cell">9</div><div class="cell">10</div>
    <!-- Row 2 -->
    <div class="cell">11</div><div class="cell">12</div><div class="cell">13</div><div class="cell">14</div><div class="cell">15</div>
    <div class="cell">16</div><div class="cell">17</div><div class="cell">18</div><div class="cell">19</div><div class="cell">20</div>
    <!-- Row 3 -->
    <div class="cell">21</div><div class="cell">22</div><div class="cell">23</div><div class="cell">24</div><div class="cell">25</div>
    <div class="cell">26</div><div class="cell">27</div><div class="cell">28</div><div class="cell">29</div><div class="cell">30</div>
    <!-- Row 4 -->
    <div class="cell">31</div><div class="cell">32</div><div class="cell">33</div><div class="cell">34</div><div class="cell">35</div>
    <div class="cell">36</div><div class="cell">37</div><div class="cell">38</div><div class="cell">39</div><div class="cell">40</div>
    <!-- Row 5 -->
    <div class="cell">41</div><div class="cell">42</div><div class="cell">43</div><div class="cell">44</div><div class="cell">45</div>
    <div class="cell">46</div><div class="cell">47</div><div class="cell">48</div><div class="cell">49</div><div class="cell">50</div>
    <!-- Row 6 -->
    <div class="cell">51</div><div class="cell">52</div><div class="cell">53</div><div class="cell">54</div><div class="cell">55</div>
    <div class="cell">56</div><div class="cell">57</div><div class="cell">58</div><div class="cell">59</div><div class="cell">60</div>
    <!-- Row 7 -->
    <div class="cell">61</div><div class="cell">62</div><div class="cell">63</div><div class="cell">64</div><div class="cell">65</div>
    <div class="cell">66</div><div class="cell">67</div><div class="cell">68</div><div class="cell">69</div><div class="cell">70</div>
    <!-- Row 8 -->
    <div class="cell">71</div><div class="cell">72</div><div class="cell">73</div><div class="cell">74</div><div class="cell">75</div>
    <div class="cell">76</div><div class="cell">77</div><div class="cell">78</div><div class="cell">79</div><div class="cell">80</div>
    <!-- Row 9 -->
    <div class="cell">81</div><div class="cell">82</div><div class="cell">83</div><div class="cell">84</div><div class="cell">85</div>
    <div class="cell">86</div><div class="cell">87</div><div class="cell">88</div><div class="cell">89</div><div class="cell">90</div>
    <!-- Row 10 -->
    <div class="cell">91</div><div class="cell">92</div><div class="cell">93</div><div class="cell">94</div><div class="cell">95</div>
    <div class="cell">96</div><div class="cell">97</div><div class="cell">98</div><div class="cell">99</div><div class="cell">100</div>

    <!-- Snake -->
    <div class="snake"></div>

    <!-- Ladder -->
    <div class="ladder">
      <div class="side left"></div>
      <div class="side right"></div>
      <div class="rung"></div>
      <div class="rung"></div>
      <div class="rung"></div>
      <div class="rung"></div>
    </div>
  </div>
</body>
</html>
